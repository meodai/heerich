<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heerich.js — CSS 3D Renderer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Aboreto&family=Work+Sans:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f0e8;
        --text: #18191b;
        --line: #d4cfc7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #18191b;
          --text: #f5f0e8;
          --line: #333;
        }
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Work Sans", sans-serif;
        font-weight: 300;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      h1 {
        font-family: "Aboreto", cursive;
        font-weight: 400;
        font-size: 1.5rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--line);
      }
      .controls {
        padding: 0.75rem 1.5rem;
        display: flex;
        gap: 1.5rem;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--line);
        font-size: 0.8rem;
      }
      .controls label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .controls select,
      .controls input[type="color"] {
        font-size: 0.75rem;
        padding: 0.2rem 0.4rem;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .controls .val {
        min-width: 2em;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #scene {
        flex: 1;
        cursor: grab;
        overflow: hidden;
      }
      #scene:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <h1>CSS 3D Renderer</h1>
    <div class="controls">
      <label
        >Scene
        <select id="scene-select">
          <option value="carved">Carved box</option>
          <option value="towers">Towers</option>
          <option value="boolean">Boolean ops</option>
          <option value="sphere">Hollow sphere</option>
          <option value="staircase">Staircase</option>
        </select>
      </label>
      <label
        >Perspective
        <input type="range" id="persp" min="200" max="2000" value="800" /><span
          class="val"
          id="persp-val"
          >800</span
        ></label
      >
      <label
        >Tile <input type="range" id="tile" min="10" max="60" value="30" /><span
          class="val"
          id="tile-val"
          >30</span
        ></label
      >
      <label>Fill <input type="color" id="fill" value="#e8e0d4" /></label>
      <label>Stroke <input type="color" id="stroke" value="#18191b" /></label>
    </div>
    <div id="scene"></div>

    <script type="module">
      import { Heerich } from "./src/heerich.js";
      import { CSS3DRenderer } from "./src/renderers/css3d.js";

      const renderer = new CSS3DRenderer(document.getElementById("scene"));
      let currentScene = null;
      let rotX = -25,
        rotY = 45;

      const scenes = {
        carved() {
          const h = new Heerich({
            style: { fill: fill.value, stroke: stroke.value, strokeWidth: 0.5 },
          });
          h.applyGeometry({
            type: "box",
            position: [0, 0, 0],
            size: [8, 5, 8],
          });
          h.applyGeometry({
            type: "sphere",
            center: [4, 2.5, 4],
            radius: 3,
            mode: "subtract",
          });
          h.removeGeometry({
            type: "box",
            position: [0, 0, 0],
            size: [3, 5, 3],
          });
          return h;
        },
        towers() {
          const h = new Heerich({
            style: { fill: fill.value, stroke: stroke.value, strokeWidth: 0.5 },
          });
          const colors = [
            "#e8927c",
            "#7cc8a0",
            "#6c5ce7",
            "#fdcb6e",
            "#fd79a8",
          ];
          for (let i = 0; i < 5; i++) {
            h.applyGeometry({
              type: "box",
              position: [i * 3, 0, 0],
              size: [2, 2 + i * 2, 2],
              style: {
                default: {
                  fill: colors[i],
                  stroke: stroke.value,
                  strokeWidth: 0.5,
                },
                top: { fill: colors[(i + 1) % 5] },
              },
            });
          }
          return h;
        },
        boolean() {
          const h = new Heerich({
            style: { fill: fill.value, stroke: stroke.value, strokeWidth: 0.5 },
          });
          h.applyGeometry({ type: "box", position: [0, 0, 0], size: 6 });
          h.applyGeometry({
            type: "sphere",
            center: [3, 3, 3],
            radius: 2.5,
            mode: "subtract",
            style: { default: { fill: "#e8927c", stroke: stroke.value } },
          });
          h.applyGeometry({
            type: "box",
            position: [2, 0, 2],
            size: [2, 6, 2],
            mode: "subtract",
            style: { default: { fill: "#7cc8a0", stroke: stroke.value } },
          });
          return h;
        },
        sphere() {
          const h = new Heerich({
            style: { fill: fill.value, stroke: stroke.value, strokeWidth: 0.5 },
          });
          h.applyGeometry({ type: "sphere", center: [5, 5, 5], radius: 5 });
          h.applyGeometry({
            type: "sphere",
            center: [5, 5, 5],
            radius: 3.5,
            mode: "subtract",
            style: { default: { fill: "#fdcb6e", stroke: stroke.value } },
          });
          h.removeGeometry({
            type: "box",
            position: [5, 0, 0],
            size: [6, 11, 11],
          });
          return h;
        },
        staircase() {
          const h = new Heerich({
            style: { fill: fill.value, stroke: stroke.value, strokeWidth: 0.5 },
          });
          for (let i = 0; i < 8; i++) {
            h.applyGeometry({
              type: "box",
              position: [i, i, 0],
              size: [1, 1, 4],
              style: {
                default: {
                  fill: fill.value,
                  stroke: stroke.value,
                  strokeWidth: 0.5,
                },
                top: { fill: "#7cc8a0" },
              },
            });
          }
          return h;
        },
      };

      const fill = document.getElementById("fill");
      const stroke = document.getElementById("stroke");
      const persp = document.getElementById("persp");
      const tile = document.getElementById("tile");
      const sceneSelect = document.getElementById("scene-select");

      function update() {
        currentScene = scenes[sceneSelect.value]();
        render();
      }

      function render() {
        if (!currentScene) return;
        renderer.render(currentScene, {
          tileSize: +tile.value,
          perspective: +persp.value,
          rotateX: rotX,
          rotateY: rotY,
        });
      }

      sceneSelect.addEventListener("change", update);
      fill.addEventListener("input", update);
      stroke.addEventListener("input", update);

      [persp, tile].forEach((el) => {
        el.addEventListener("input", () => {
          document.getElementById(el.id + "-val").textContent = el.value;
          if (el === tile) update();
          else render();
        });
      });

      // Drag to rotate
      let dragging = false,
        lastX,
        lastY;
      const sceneEl = document.getElementById("scene");
      sceneEl.addEventListener("pointerdown", (e) => {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        sceneEl.setPointerCapture(e.pointerId);
      });
      sceneEl.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        rotY += (e.clientX - lastX) * 0.5;
        rotX = Math.max(-90, Math.min(90, rotX + (e.clientY - lastY) * 0.5));
        lastX = e.clientX;
        lastY = e.clientY;
        render();
      });
      sceneEl.addEventListener("pointerup", () => {
        dragging = false;
      });

      update();
    </script>
  </body>
</html>
